name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4
        with:
          ref: v0.9.0
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28b  # r28b = 28.2.13676358
          link-to-sdk: true

      - name: Set ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Verify NDK path
        run: |
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"  
          ls -la $ANDROID_NDK_HOME

      # - name: Flutter installieren
      #   run: |
      #     git clone https://github.com/flutter/flutter.git -b 3.41.6 --depth 1
      #     echo "$PWD/flutter/bin" >> $GITHUB_PATH
      #     echo "FLUTTER_COMMIT=$(git -C flutter rev-parse HEAD)" >> $GITHUB_ENV

      # - name: Flutter Revision ausgeben
      #   run: |
      #     echo "Flutter commit: $FLUTTER_COMMIT"

      - name: Build-Pfad ausgeben
        run: |
           pwd     

      - name: Flutter aus Submodul einrichten
        run: |
          FLUTTER_ROOT="${GITHUB_WORKSPACE}/flutter"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV
          echo "$FLUTTER_ROOT/bin" >> $GITHUB_PATH
          
      - name: Flutter precache (Android)
        run: flutter precache --android
          
      - name: Flutter config
        run: |
          flutter config --no-analytics
          flutter doctor -v


      - name: Flutter Version prüfen
        run: flutter --version


      - uses: actions/setup-java@v1
        with:
          java-version: '21.0.9'

      - name: Set reproducible env
        run: |
          echo "SOURCE_DATE_EPOCH=1776113449" >> $GITHUB_ENV
          echo "PUB_CACHE=$PWD/.pub-cache" >> $GITHUB_ENV

      - name: Dependencies holen
        run: flutter pub get --enforce-lockfile

      - name: Patch dartjni
        run: |
          JNI_CMAKE=$(find $PUB_CACHE/hosted/pub.dev -path "*/jni-*/src/CMakeLists.txt" | head -n 1)
          if [ -n "$JNI_CMAKE" ] && [ -f "$JNI_CMAKE" ]; then
            sed -i '2i add_link_options("LINKER:--build-id=none")' "$JNI_CMAKE"
            echo "Patched CMakeLists.txt in $JNI_CMAKE"
          else
            echo "Error: jni CMakeLists.txt not found in expected location."
            exit 1
          fi

      - name: Keystore erstellen
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: key.properties erstellen
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Release Build per ABI (APK)
        run: flutter build apk --release  --split-per-abi  --no-tree-shake-icons

      - name: Release Build (APK)
        run: flutter build apk --release  --no-tree-shake-icons

      - name: Rename results
        run: |
          [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ] && mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/slowmail-arm64-v8a.apk
          [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ] && mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/slowmail-armeabi-v7a.apk
          [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ] && mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/slowmail-x86_64.apk
          [ -f build/app/outputs/flutter-apk/app-release.apk ] && cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/slowmail.apk

      # Alternative:
      # - name: Release Build (AAB)
      #   run: flutter build appbundle

      # - name: Artifact hochladen
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: app-release
      #     path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "v0.9.0"
          prerelease: false
          file_glob: true
          file: build/app/outputs/flutter-apk/*.apk
          overwrite: true
          body: "Preview binaries for testinstall"

      - name: Setup tmate session
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3          
