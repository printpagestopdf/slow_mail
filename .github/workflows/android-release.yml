name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Flutter installieren
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - uses: actions/setup-java@v1
        with:
          java-version: '21.0.9'

      - name: Dependencies holen
        run: flutter pub get

      - name: Keystore erstellen
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: key.properties erstellen
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - run: flutter --version

      - name: Release Build per ABI (APK)
        run: flutter build apk --release  --split-per-abi --no-tree-shake-icons

      - name: Release Build (APK)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename results
        run: |
          [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ] && mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/slowmail-arm64-v8a.apk
          [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ] && mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/slowmail-armeabi-v7a.apk
          [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ] && mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/slowmail-x86_64.apk
          [ -f build/app/outputs/flutter-apk/app-release.apk ] && mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/cb_app.apk

      # Alternative:
      # - name: Release Build (AAB)
      #   run: flutter build appbundle

      # - name: Artifact hochladen
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: app-release
      #     path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest"
          prerelease: true
          file_glob: true
          file: build/app/outputs/flutter-apk/*.apk
          overwrite: true
          body: "Preview binaries for testinstall"
